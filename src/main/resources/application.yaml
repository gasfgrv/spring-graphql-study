server:
  port: 8080

spring:
  application:
    name: demo-graphql
  graphql:
    graphiql:
      enabled: true
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/study_db}
    username: ${DB_USER:spring}
    password: ${DB_PASS:spring}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
